<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elite Clothing</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#222;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h2{
    color:#ff6600;
}

nav button{
    padding:10px 15px;
    margin-left:10px;
    border:none;
    background:#ff6600;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

nav button:hover{
    background:#cc5200;
}

.hero img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.page{
    display:none;
    padding:30px;
    text-align:center;
}

.active{
    display:block;
}

.search-box{
    position:relative;
    width:300px;
    margin:20px auto;
}

.search-box input{
    width:100%;
    padding:12px;
    border-radius:5px;
    border:1px solid gray;
}

#suggestions{
    position:absolute;
    width:100%;
    background:white;
    text-align:left;
    box-shadow:0 5px 10px #aaa;
}

#suggestions div{
    padding:10px;
    cursor:pointer;
}

#suggestions div:hover{
    background:#eee;
}

button{
    padding:10px 20px;
    border:none;
    background:#ff6600;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.products{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    width:220px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 5px 15px #ccc;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

.price{
    color:green;
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

#cart{
    margin-top:40px;
    background:white;
    padding:20px;
    border-radius:10px;
}

#cart ul{
    list-style:none;
}

#cart li{
    margin:10px;
}

form input{
    display:block;
    width:250px;
    padding:12px;
    margin:15px auto;
}

</style>

</head>

<body>

<header>

<h2>👕 Elite Clothing</h2>

<nav>

<button onclick="showPage('home')">
Home
</button>

<button id="loginBtn" onclick="showPage('login')">
Login
</button>

<button id="signupBtn" onclick="showPage('signup')">
Sign Up
</button>

</nav>

</header>


<div class="hero">

<img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200">

</div>



<div id="home" class="page active">

<h1>Welcome To Elite Clothing</h1>

<p>Fashion that matches everyone</p>


<div class="search-box">

<input id="searchInput" placeholder="Search products..." onkeyup="showSuggestions()">

<div id="suggestions"></div>

</div>


<button onclick="searchProduct()">
Search
</button>


<h3 id="result"></h3>


<div class="products">


<div class="card">
<img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=400">
<h3>Hoodie</h3>
<p class="price">$40</p>
<button onclick="addToCart('Hoodie',40)">Add to Cart</button>
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400">
<h3>T-Shirt</h3>
<p class="price">$20</p>
<button onclick="addToCart('T-Shirt',20)">Add to Cart</button>
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1542272604-787c3835535d?w=400">
<h3>Jeans</h3>
<p class="price">$45</p>
<button onclick="addToCart('Jeans',45)">Add to Cart</button>
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400">
<h3>Sneakers</h3>
<p class="price">$70</p>
<button onclick="addToCart('Sneakers',70)">Add to Cart</button>
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1525507119028-ed4c629a60a3?w=400">
<h3>Dress</h3>
<p class="price">$55</p>
<button onclick="addToCart('Dress',55)">Add to Cart</button>
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1575428652377-a2d80e2277fc?w=400">
<h3>Cap</h3>
<p class="price">$15</p>
<button onclick="addToCart('Cap',15)">Add to Cart</button>
</div>
<div class="card">
<img src="https://www.bing.com/th/id/OIP.4o-P3vqy8xl5-_6f1hUskwHaHt?w=193&h=202&c=8&rs=1&qlt=90&r=0&o=6&pid=ImgAns&rm=2">
<h3>Jacket</h3>
<p class="price">$60</p>
<button onclick="addToCart('Jacket',60)">Add to Cart</button>
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1575428652377-a2d80e2277fc?w=400">
<h3>Sweater</h3>
<p class="price">$35</p>
<button onclick="addToCart('Sweater',35)">Add to Cart</button>
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1515955656352-a1fa3ffcd111?w=400">
<h3>Backpack</h3>
<p class="price">$50</p>
<button onclick="addToCart('Backpack',50)">Add to Cart</button>
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1582966772680-860e372bb558?w=400">
<h3>Shorts</h3>
<p class="price">$30</p>
<button onclick="addToCart('Shorts',30)">Add to Cart</button>
</div>


</div>



<div id="cart">

<h2>Shopping Cart</h2>

<ul id="cartList"></ul>

<h3 id="total">
Total: $0
</h3>

</div>


</div>



<div id="login" class="page">

<h2>Login</h2>

<form>

<input id="loginEmail" type="email" placeholder="Email">

<input id="loginPassword" type="password" placeholder="Password">

<button type="button" onclick="login()">
Login
</button>

</form>

</div>




<div id="signup" class="page">

<h2>Create Account</h2>

<form>

<input id="signupEmail" type="email" placeholder="Email">

<input id="signupPassword" type="password" placeholder="Password">

<button type="button" onclick="signup()">
Sign Up
</button>

</form>

</div>
<script>

let products=[
"hoodie",
"t-shirt",
"jeans",
"sneakers",
"jacket",
"dress",
"sweater",
"cap",
"backpack",
"shorts"
];


function showPage(page){

let pages=document.querySelectorAll(".page");

pages.forEach(function(p){
    p.classList.remove("active");
});

document.getElementById(page).classList.add("active");

}



function showSuggestions(){

let input=document.getElementById("searchInput").value.toLowerCase();

let box=document.getElementById("suggestions");

box.innerHTML="";


if(input==""){
    return;
}


let matches=products.filter(function(product){

return product.startsWith(input);

});


matches.forEach(function(item){

let div=document.createElement("div");

div.innerHTML=item;


div.onclick=function(){

document.getElementById("searchInput").value=item;

box.innerHTML="";

};


box.appendChild(div);


});


}




function searchProduct(){

let value=document.getElementById("searchInput").value.toLowerCase();


if(products.includes(value)){

document.getElementById("result").innerHTML=
"✅ Found: "+value;

}

else{

document.getElementById("result").innerHTML=
"❌ Product not found";

}

}




function signup(){

let email=document.getElementById("signupEmail").value;

let password=document.getElementById("signupPassword").value;


if(email=="" || password==""){

alert("Please fill all fields");

return;

}


localStorage.setItem("userEmail",email);

localStorage.setItem("userPassword",password);


alert("Account created successfully!");

showPage("login");

}




function login(){

let email=document.getElementById("loginEmail").value;

let password=document.getElementById("loginPassword").value;


let savedEmail=localStorage.getItem("userEmail");

let savedPassword=localStorage.getItem("userPassword");



if(email==savedEmail && password==savedPassword){


alert("Login successful!");


localStorage.setItem("loggedIn","true");


updateNavbar();


showPage("home");


}

else{


alert("Wrong email or password");


}


}





function updateNavbar(){


let loginBtn=document.getElementById("loginBtn");

let signupBtn=document.getElementById("signupBtn");



if(localStorage.getItem("loggedIn")=="true"){


loginBtn.innerHTML="Logout";

loginBtn.onclick=logout;


signupBtn.style.display="none";


}

else{


loginBtn.innerHTML="Login";


loginBtn.onclick=function(){

showPage("login");

};


signupBtn.style.display="inline-block";


}


}




function logout(){


localStorage.removeItem("loggedIn");


alert("Logged out successfully!");


updateNavbar();


showPage("home");


}







let cart=[];


if(localStorage.getItem("cart")){

cart=JSON.parse(localStorage.getItem("cart"));

displayCart();

}





function addToCart(name,price){


cart.push({

name:name,

price:price

});


localStorage.setItem("cart",JSON.stringify(cart));


displayCart();


alert(name+" added to cart!");

}




function displayCart(){


let cartList=document.getElementById("cartList");

let total=document.getElementById("total");


cartList.innerHTML="";


let sum=0;



cart.forEach(function(item,index){


sum+=item.price;



cartList.innerHTML+=`

<li>

${item.name} - $${item.price}

<button onclick="removeItem(${index})">

Remove

</button>

</li>

`;


});



total.innerHTML="Total: $"+sum;


}





function removeItem(index){


cart.splice(index,1);


localStorage.setItem("cart",JSON.stringify(cart));


displayCart();


}




// keep login status after refresh

updateNavbar();


</script>


</body>

</html>
